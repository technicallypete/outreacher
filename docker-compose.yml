services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: outreacher
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    command: bun run dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app                # hot reload
      - /app/node_modules     # keep container node_modules
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://app:app@postgres:5432/outreacher
      - MCP_URL=http://mcp:3001
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
      target: dev
    volumes:
      - ./mcp:/src
    ports:
      - "${MCP_HOST_PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://mcp:mcp@postgres:5432/outreacher
      - DATABASE_ADMIN_URL=postgresql://admin:admin@postgres:5432/outreacher
      - MCP_URL=http://mcp:3001
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
